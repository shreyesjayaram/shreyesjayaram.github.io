# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Shreyes Jayaram"
title_separator          : "-"
name                     : &name "Shreyes Jayaram"
description              : &description "Academic website of Shreyes Jayaram"

url                      : "https://shreyesjayaram.github.io"
baseurl                  : ""
repository               : "shreyesjayaram/shreyesjayaram.github.io"

# Site Author
author:
  avatar                 : "profile.jpeg"
  name                   : "Shreyes Jayaram"
  pronouns               :
  bio                    : |
    PhD Candidate

    <a class="ucla-link" href="https://polisci.ucla.edu/" target="_blank">UCLA Political Science</a>

    <div class="profile-buttons">
      <a href="mailto:jayaram@ucla.edu">✉ Email</a>
      <a href="tel:YOUR_PHONE_NUMBER">☎ Phone</a>
      <a href="https://maps.google.com/?q=UCLA+Department+of+Political+Science" target="_blank">⌂ Address</a>
    </div>
  location               :
  employer               :
  uri                    :
  email                  :

  googlescholar          :
  orcid                  :
  pubmed                 :

  github                 :
  linkedin               :
  twitter                :
  bluesky                :

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 200
future                   : true
read_more                : "disabled"
talkmap_link             : false
search                   : true
comments:
  provider               : false

atom_feed:
  hide                   : true

# SEO and Social
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 :
social:
  type                   : Person
  name                   : "Shreyes Jayaram"
  links: []

# Analytics
analytics:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README
  - Rakefile
  - vendor
  - node_modules

keep_files:
  - .git

encoding                 : "utf-8"
markdown_ext             : "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown                 : kramdown
highlighter              : rouge
lsi                      : false
excerpt_separator        : "\n\n"
incremental              : false

# Markdown Processing
kramdown:
  input                  : GFM
  hard_wrap              : false
  auto_ids               : true
  footnote_nr            : 1
  entity_output          : as_char
  toc_levels             : 1..6
  smart_quotes           : lsquo,rsquo,ldquo,rdquo
  enable_coderay         : false

# Collections
collections:
  teaching:
    output               : true
    permalink            : /teaching/:path/
  publications:
    output               : true
    permalink            : /publications/:path/
  portfolio:
    output               : true
    permalink            : /portfolio/:path/
  talks:
    output               : true
    permalink            : /talks/:path/

# Defaults
defaults:
  - scope:
      path               : ""
      type               : posts
    values:
      layout             : single
      author_profile     : true
      read_time          : true
      comments           : false
      share              : false
      related            : true

  - scope:
      path               : ""
      type               : pages
    values:
      layout             : single
      author_profile     : true

  - scope:
      path               : ""
      type               : teaching
    values:
      layout             : single
      author_profile     : true

  - scope:
      path               : ""
      type               : publications
    values:
      layout             : single
      author_profile     : true

  - scope:
      path               : ""
      type               : portfolio
    values:
      layout             : single
      author_profile     : true

  - scope:
      path               : ""
      type               : talks
    values:
      layout             : single
      author_profile     : true

# Sass/SCSS
sass:
  sass_dir               : _sass
  style                  : compressed

# Outputting
permalink                : /:categories/:title/
timezone                 : America/Los_Angeles

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jemoji

# Archives
category_archive:
  type                   : liquid
  path                   : /categories/

tag_archive:
  type                   : liquid
  path                   : /tags/

# HTML Compression
compress_html:
  clippings              : all
  ignore:
    envs                 : development
